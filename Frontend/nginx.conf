# ============================================================
# Nginx 配置 — 前端静态文件 + 后端 API 反向代理
# ============================================================

server {
    listen       80;
    server_name  localhost;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;
    gzip_vary on;
    gzip_proxied any;

    # 静态资源（带 hash 的文件可长期缓存）
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到后端
    # 开发时 Vite 代理把 /api → /api/v1，这里保持一致
    location /api/ {
        proxy_pass http://backend:18080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://backend:18080/uploads/;
        proxy_set_header Host $host;
    }

    # Knife4j API 文档代理
    location /doc.html {
        proxy_pass http://backend:18080;
        proxy_set_header Host $host;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:18080;
        proxy_set_header Host $host;
    }
    location /v3/api-docs/ {
        proxy_pass http://backend:18080;
        proxy_set_header Host $host;
    }
    location /webjars/ {
        proxy_pass http://backend:18080;
        proxy_set_header Host $host;
    }

    # 前端页面 — Vue Router history 模式必须回退到 index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 错误页
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
