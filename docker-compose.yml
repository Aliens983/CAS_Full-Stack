# ============================================================
# Docker Compose — 校园预约系统一键部署
#
# 使用方法:
#   1. 复制 .env.example 为 .env 并修改配置
#   2. docker compose up -d
#   3. 访问 http://localhost
#
# 服务架构:
#   Nginx(:80) → 前端静态文件 + /api 反向代理 → Backend(:18080)
#   Backend → MySQL(:3306) + Redis(:6379)
# ============================================================

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: cas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: cas_db
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      # 数据持久化
      - mysql-data:/var/lib/mysql
      # 初始化 SQL 脚本（按数字前缀顺序执行）
      - ./CampusAppointmentSystem/sql:/docker-entrypoint-initdb.d
      # 自定义 MySQL 配置
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cas-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: cas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cas-network

  # ==================== 后端 Spring Boot ====================
  backend:
    build:
      context: ./CampusAppointmentSystem
      dockerfile: Dockerfile
    image: cas-backend:1.0.0
    container_name: cas-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-18080}:18080"
    environment:
      # ---- 服务器 ----
      SERVER_PORT: "18080"
      # ---- 数据库 ----
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cas_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      # ---- Redis ----
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ---- SMTP 邮件 ----
      SPRING_MAIL_HOST: ${SMTP_HOST:-smtp.163.com}
      SPRING_MAIL_PORT: "${SMTP_PORT:-465}"
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD:-}
      # ---- JWT ----
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION: "${JWT_EXPIRATION:-86400000}"
      # ---- 文件上传 ----
      FILE_UPLOAD_PATH: ${FILE_UPLOAD_PATH:-./uploads/}
      FILE_UPLOAD_SERVER_ADDRESS: ${FILE_UPLOAD_SERVER_ADDRESS:-http://localhost:18080}
      # ---- 日志 ----
      LOGGING_LEVEL_COM_LAOLIU: ${LOG_LEVEL:-info}
      # ---- 天气 API ----
      WEATHER_API_ID: ${WEATHER_API_ID:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      # ---- AI ----
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      # ---- 阿里云 OSS ----
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-}
      # ---- 阿里云 SMS ----
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      # ---- JVM ----
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cas-network

  # ==================== 前端 Nginx ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cas-frontend:1.0.0
    container_name: cas-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - cas-network

# ==================== 持久化卷 ====================
volumes:
  mysql-data:
    name: cas-mysql-data
  redis-data:
    name: cas-redis-data
  uploads-data:
    name: cas-uploads-data

# ==================== 内部网络 ====================
networks:
  cas-network:
    name: cas-network
    driver: bridge
